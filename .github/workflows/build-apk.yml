# 文件名：.github/workflows/build-apk.yml
# 目录：D:\MenuApp\.github\workflows\build-apk.yml

name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            openjdk-11-jdk \
            autoconf \
            automake \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev \
            libncurses5 \
            libtinfo5

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.23.0
          pip install buildozer

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          cmdline-tools-version: 8512546
          platforms: android-32
          build-tools: 32.0.0

      - name: Prepare project for Buildozer
        run: |
          mkdir -p menuapp_build
          cd menuapp_build
          cp -r ../mobile .
          cp -r ../models .
          cp -r ../services .
          cp -r ../repositories .
          cp -r ../utils .
          cp -r ../data .
          cp ../mobile/requirements.txt . 2>/dev/null || echo "flet==0.23.0" > requirements.txt
          
          printf '%s\n' 'import sys' 'from pathlib import Path' '' 'project_root = Path(__file__).parent' 'sys.path.insert(0, str(project_root))' '' 'import flet as ft' 'from mobile.app import MenuApp' '' 'def main(page: ft.Page):' '    page.title = "个人菜谱管理系统"' '    page.bgcolor = "#F7F7F7"' '    page.padding = 0' '    page.theme_mode = ft.ThemeMode.LIGHT' '    app = MenuApp(page)' '    page.add(app)' '' 'if __name__ == "__main__":' '    ft.app(target=main)' > main.py
          
          printf '%s\n' '[app]' 'title = MenuApp' 'package.name = menuapp' 'package.domain = com.menuapp' 'source.dir = .' 'source.include_exts = py,png,jpg,kv,atlas,db,csv,json' 'source.exclude_exts = spec,pyc,__pycache__,.git,.idea' 'version = 1.0.0' 'requirements = python3,flet==0.23.0' 'orientation = portrait' 'android.permissions = INTERNET,ACCESS_NETWORK_STATE,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE' 'android.api = 32' 'android.minapi = 21' 'android.ndk = 23b' 'android.accept_sdk_license = True' 'android.arch = arm64-v8a' 'p4a.source_dir = ' 'p4a.branch = master' 'p4a.commit = ' '' '[buildozer]' 'log_level = 2' 'warn_on_root = 1' > buildozer.spec
          
          echo "Buildozer 配置完成"

      - name: Build APK with Buildozer
        run: |
          cd menuapp_build
          rm -rf .buildozer
          buildozer android debug
          buildozer android debug
        timeout-minutes: 90

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: menu-app-debug
          path: menuapp_build/bin/*-debug.apk

      - name: Create Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: menuapp_build/bin/*-debug.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
