# 文件名：.github/workflows/build-apk.yml
# 目录：D:\MenuApp\.github\workflows\build-apk.yml

name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            openjdk-11-jdk \
            autoconf \
            automake \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.23.0
          pip install buildozer

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          cmdline-tools-version: 8512546
          platforms: android-32
          build-tools: 32.0.0

      - name: Prepare project for Buildozer
        run: |
          mkdir -p menuapp_build
          cd menuapp_build
          cp -r ../mobile .
          cp -r ../models .
          cp -r ../services .
          cp -r ../repositories .
          cp -r ../utils .
          cp -r ../data .
          cp ../mobile/requirements.txt . 2>/dev/null || echo "flet==0.23.0" > requirements.txt
          
          # 创建 main.py - 使用 echo 命令
          echo "import sys" > main.py
          echo "from pathlib import Path" >> main.py
          echo "" >> main.py
          echo "project_root = Path(__file__).parent" >> main.py
          echo "sys.path.insert(0, str(project_root))" >> main.py
          echo "" >> main.py
          echo "import flet as ft" >> main.py
          echo "from mobile.app import MenuApp" >> main.py
          echo "" >> main.py
          echo "def main(page: ft.Page):" >> main.py
          echo "    page.title = \"个人菜谱管理系统\"" >> main.py
          echo "    page.bgcolor = \"#F7F7F7\"" >> main.py
          echo "    page.padding = 0" >> main.py
          echo "    page.theme_mode = ft.ThemeMode.LIGHT" >> main.py
          echo "    app = MenuApp(page)" >> main.py
          echo "    page.add(app)" >> main.py
          echo "" >> main.py
          echo "if __name__ == \"__main__\":" >> main.py
          echo "    ft.app(target=main)" >> main.py
          
          # 创建 buildozer.spec - 使用 echo 命令
          echo "[app]" > buildozer.spec
          echo "title = MenuApp" >> buildozer.spec
          echo "package.name = menuapp" >> buildozer.spec
          echo "package.domain = com.menuapp" >> buildozer.spec
          echo "source.dir = ." >> buildozer.spec
          echo "source.include_exts = py,png,jpg,kv,atlas,db,csv,json" >> buildozer.spec
          echo "source.exclude_exts = spec,pyc,__pycache__,.git,.idea" >> buildozer.spec
          echo "version = 1.0.0" >> buildozer.spec
          echo "requirements = python3,flet==0.23.0" >> buildozer.spec
          echo "orientation = portrait" >> buildozer.spec
          echo "android.permissions = INTERNET,ACCESS_NETWORK_STATE,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE" >> buildozer.spec
          echo "android.api = 32" >> buildozer.spec
          echo "android.minapi = 21" >> buildozer.spec
          echo "android.ndk = 23b" >> buildozer.spec
          echo "android.accept_sdk_license = True" >> buildozer.spec
          echo "android.arch = arm64-v8a" >> buildozer.spec
          echo "p4a.source_dir = " >> buildozer.spec
          echo "p4a.branch = master" >> buildozer.spec
          echo "p4a.commit = " >> buildozer.spec
          echo "" >> buildozer.spec
          echo "[buildozer]" >> buildozer.spec
          echo "log_level = 2" >> buildozer.spec
          echo "warn_on_root = 1" >> buildozer.spec
          
          echo "Buildozer 配置完成"
          ls -la

      - name: Build APK with Buildozer
        run: |
          cd menuapp_build
          rm -rf .buildozer
          buildozer android debug
          buildozer android debug
        timeout-minutes: 90

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: menu-app-debug
          path: menuapp_build/bin/*-debug.apk

      - name: Create Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: menuapp_build/bin/*-debug.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
