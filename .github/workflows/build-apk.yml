# Build Android APK - 使用 NDK 25c（官方最新版本）

name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip openjdk-11-jdk build-essential libssl-dev libffi-dev python3-dev
          pip install --upgrade pip
          pip install flet==0.23.0 cython buildozer

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          cmdline-tools-version: 8512546
          platforms: android-32
          build-tools: 32.0.0

      - name: Prepare Project
        run: |
          echo "=== Starting Build Preparation ==="
          
          mkdir -p build
          cd build
          
          echo "Copying project files..."
          cp -rv ../mobile/* . || true
          cp -rv ../models . || true
          cp -rv ../services . || true
          cp -rv ../repositories . || true
          cp -rv ../utils . || true
          cp -rv ../data . || true
          
          echo ""
          echo "=== Files in build directory ==="
          ls -la
          
          echo ""
          echo "=== Checking critical files ==="
          if [ -f "android_main.py" ]; then
            echo "✅ android_main.py found"
          else
            echo "❌ android_main.py NOT found"
            exit 1
          fi
          
          if [ -f "buildozer.spec" ]; then
            echo "✅ buildozer.spec found"
            echo "Content:"
            cat buildozer.spec
          else
            echo "❌ buildozer.spec NOT found"
            exit 1
          fi
          
          echo ""
          echo "=== Preparation Complete ==="

      - name: Build APK
        run: |
          echo "=== Starting APK Build ==="
          cd build
          
          rm -rf .buildozer
          
          echo "Running buildozer android debug..."
          buildozer android debug
          
          BUILD_STATUS=$?
          
          if [ $BUILD_STATUS -eq 0 ]; then
            echo ""
            echo "=== ✅ Build Successful ==="
            ls -lh bin/*.apk 2>/dev/null
          else
            echo ""
            echo "=== ❌ Build Failed (exit code: $BUILD_STATUS) ==="
            exit $BUILD_STATUS
          fi
        timeout-minutes: 90

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: menu-app-${{ github.sha }}
          path: build/bin/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/bin/*.apk
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
