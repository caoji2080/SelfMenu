# Build Android APK - 自动下载 NDK 25b（带重试机制）

name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip openjdk-11-jdk build-essential libssl-dev libffi-dev python3-dev
          pip install --upgrade pip
          pip install flet==0.23.0 cython buildozer

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          cmdline-tools-version: 8512546
          platforms: android-32
          build-tools: 32.0.0

      - name: Build APK with Retry
        run: |
          echo "=== Starting APK Build Process ==="
          
          mkdir -p build
          cd build
          
          echo "Copying project files..."
          cp -rv ../mobile/* . || true
          cp -rv ../models . || true
          cp -rv ../services . || true
          cp -rv ../repositories . || true
          cp -rv ../utils . || true
          cp -rv ../data . || true
          
          echo ""
          echo "=== Files in build directory ==="
          ls -la
          
          echo ""
          echo "=== Checking critical files ==="
          if [ -f "android_main.py" ]; then
            echo "✅ android_main.py found"
          else
            echo "❌ android_main.py NOT found"
            exit 1
          fi
          
          if [ -f "buildozer.spec" ]; then
            echo "✅ buildozer.spec found"
            echo "Content:"
            cat buildozer.spec
          else
            echo "❌ buildozer.spec NOT found"
            exit 1
          fi
          
          echo ""
          echo "=== Starting Build with Retry Mechanism ==="
          
          # 清理旧的构建缓存
          rm -rf .buildozer
          
          # 重试机制配置
          max_attempts=3
          attempt=1
          success=false
          
          while [ $attempt -le $max_attempts ] && [ "$success" = false ]; do
            echo ""
            echo "========================================="
            echo "🔄 Attempt $attempt of $max_attempts"
            echo "========================================="
            
            if buildozer android debug; then
              echo ""
              echo "✅ Build succeeded on attempt $attempt!"
              success=true
            else
              echo ""
              echo "⚠️ Build failed on attempt $attempt"
              
              # 清理临时文件，准备重试
              echo "🧹 Cleaning temporary files..."
              rm -rf .buildozer/temp
              rm -rf .buildozer/.cache
              
              attempt=$((attempt + 1))
              
              if [ $attempt -gt $max_attempts ]; then
                echo ""
                echo "❌ All $max_attempts attempts failed!"
                exit 1
              fi
              
              echo "⏳ Waiting 15 seconds before retry..."
              sleep 15
            fi
          done
          
          echo ""
          echo "=== Build Complete ==="
          echo "APK location:"
          ls -lh bin/*.apk 2>/dev/null || echo "⚠️ APK not found"
        timeout-minutes: 90

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: menu-app-${{ github.sha }}
          path: build/bin/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/bin/*.apk
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
