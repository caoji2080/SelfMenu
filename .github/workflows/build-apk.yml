# Build Android APK - Pure Python Mode (No NDK Required)
# MenuApp: Python + Flet only, no C/C++ dependencies

name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            openjdk-11-jdk \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev \
            wget \
            curl \
            autoconf \
            automake \
            pkg-config \
            libncursesw6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          cmdline-tools-version: 8512546
          platforms: android-32
          build-tools: 32.0.0

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install cython==3.0.0
          pip install flet==0.23.0
          pip install buildozer==1.5.0
          pip list

      - name: Prepare Project
        run: |
          echo "=== Preparing Project Files ==="
          
          mkdir -p build
          cd build
          
          echo "Copying mobile app files..."
          cp -rv ../mobile/* .
          
          echo "Copying project modules..."
          cp -rv ../models . || true
          cp -rv ../services . || true
          cp -rv ../repositories . || true
          cp -rv ../utils . || true
          cp -rv ../data . || true
          
          echo ""
          echo "=== Verifying Files ==="
          ls -la
          
          # 检查关键文件
          if [ ! -f "android_main.py" ]; then
            echo "❌ android_main.py not found!"
            exit 1
          fi
          
          if [ ! -f "buildozer.spec" ]; then
            echo "❌ buildozer.spec not found!"
            exit 1
          fi
          
          echo ""
          echo "✅ All files prepared successfully"
          echo ""
          echo "buildozer.spec content:"
          cat buildozer.spec

      - name: Build APK (Pure Python Mode)
        run: |
          echo "=== Starting APK Build ==="
          cd build
          
          # 清理旧缓存
          rm -rf .buildozer
          
          # 显示构建配置
          echo ""
          echo "=== Build Configuration ==="
          echo "Python version: $(python3 --version)"
          echo "Cython version: $(cython --version 2>&1 | head -1)"
          echo "Buildozer version: $(buildozer --version 2>&1 | head -1)"
          echo "Working directory: $(pwd)"
          echo ""
          
          # 设置环境变量
          export PYTHONIOENCODING=utf-8
          export LANG=C.UTF-8
          export LC_ALL=C.UTF-8
          
          # 开始构建（不使用 NDK）
          echo "Running buildozer android debug (pure Python mode)..."
          echo ""
          
          # 执行构建并捕获所有输出
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
          
          BUILD_STATUS=${PIPESTATUS[0]}
          
          if [ $BUILD_STATUS -eq 0 ]; then
            echo ""
            echo "=== ✅ Build Successful ==="
            echo "Generated APK files:"
            ls -lh bin/*.apk 2>/dev/null || echo "⚠️ APK not found in bin/"
          else
            echo ""
            echo "=== ❌ Build Failed (exit code: $BUILD_STATUS) ==="
            echo ""
            echo "=== Last 100 lines of build log ==="
            tail -n 100 build.log
            echo ""
            echo "=== Searching for errors in log ==="
            grep -i "error\|failed\|exception" build.log | tail -20 || echo "No obvious errors found"
            exit $BUILD_STATUS
          fi
        timeout-minutes: 90

      - name: Upload Build Log (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/build.log
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: menu-app-${{ github.sha }}
          path: build/bin/*.apk
        continue-on-error: true

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/bin/*.apk
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
