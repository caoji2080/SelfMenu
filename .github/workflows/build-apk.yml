# Build Android APK - 使用预安装 NDK（隔离下载问题）

name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip openjdk-11-jdk build-essential libssl-dev libffi-dev python3-dev
          pip install --upgrade pip
          pip install flet==0.23.0 cython buildozer

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          cmdline-tools-version: 8512546
          platforms: android-32
          build-tools: 32.0.0
          ndk-version: 25.1.8937393

      - name: Setup NDK Environment
        run: |
          echo "=== Setting up NDK Environment ==="
          
          # 设置 NDK 环境变量
          export ANDROID_NDK=${ANDROID_HOME}/ndk/25.1.8937393
          export NDK_HOME=${ANDROID_HOME}/ndk/25.1.8937393
          
          echo "ANDROID_NDK=$ANDROID_NDK" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          
          # 验证 NDK 安装
          if [ -d "$ANDROID_NDK" ]; then
            echo "✅ NDK installed at: $ANDROID_NDK"
            ls -la "$ANDROID_NDK" | head -10
          else
            echo "❌ NDK not found at: $ANDROID_NDK"
            echo "Available in Android home:"
            ls -la ${ANDROID_HOME}
            exit 1
          fi
          
          echo "=== NDK Environment Setup Complete ==="

      - name: Prepare Project
        run: |
          echo "=== Starting Build Preparation ==="
          
          mkdir -p build
          cd build
          
          echo "Copying project files..."
          cp -rv ../mobile/* . || true
          cp -rv ../models . || true
          cp -rv ../services . || true
          cp -rv ../repositories . || true
          cp -rv ../utils . || true
          cp -rv ../data . || true
          
          # 创建 buildozer.local.spec 覆盖配置，指定 NDK 路径
          echo "" >> buildozer.spec
          echo "# Auto-generated for CI environment" >> buildozer.spec
          echo "android.ndk_path = ${ANDROID_HOME}/ndk/25.1.8937393" >> buildozer.spec
          
          echo ""
          echo "=== Files in build directory ==="
          ls -la
          
          echo ""
          echo "=== Checking critical files ==="
          if [ -f "android_main.py" ]; then
            echo "✅ android_main.py found"
          else
            echo "❌ android_main.py NOT found"
          fi
          
          if [ -f "buildozer.spec" ]; then
            echo "✅ buildozer.spec found"
            echo "Content:"
            cat buildozer.spec
          else
            echo "❌ buildozer.spec NOT found"
          fi
          
          echo ""
          echo "=== Preparation Complete ==="

      - name: Build APK
        run: |
          echo "=== Starting APK Build ==="
          cd build
          
          rm -rf .buildozer
          
          echo "Running buildozer..."
          buildozer android debug
          
          echo "=== Build Complete ==="
        timeout-minutes: 90

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: menu-app
          path: build/bin/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/bin/*.apk
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
