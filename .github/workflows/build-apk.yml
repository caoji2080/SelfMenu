# Build Android APK - 从 GitHub 下载 NDK 25c

name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip openjdk-11-jdk build-essential libssl-dev libffi-dev python3-dev
          pip install --upgrade pip
          pip install flet==0.23.0 cython buildozer

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          cmdline-tools-version: 8512546
          platforms: android-32
          build-tools: 32.0.0

      - name: Download NDK 25c from GitHub
        run: |
          echo "=== Downloading NDK 25c from GitHub ==="
          
          # 创建 NDK 目录
          mkdir -p ${ANDROID_HOME}/ndk
          
          # 从 GitHub 下载 NDK 25c
          NDK_URL="https://github.com/android/ndk/releases/download/25.2.9519653/android-ndk-r25c-linux.zip"
          NDK_ZIP="${ANDROID_HOME}/ndk/android-ndk-r25c-linux.zip"
          NDK_DIR="${ANDROID_HOME}/ndk/25.2.9519653"
          
          echo "Downloading from: $NDK_URL"
          curl -L -o "$NDK_ZIP" "$NDK_URL"
          
          if [ -f "$NDK_ZIP" ]; then
            echo "✅ NDK downloaded successfully"
            
            # 解压 NDK
            echo "Extracting NDK..."
            unzip -q "$NDK_ZIP" -d ${ANDROID_HOME}/ndk
            rm "$NDK_ZIP"
            
            # 重命名目录为版本号
            if [ -d "${ANDROID_HOME}/ndk/android-ndk-r25c" ]; then
              mv "${ANDROID_HOME}/ndk/android-ndk-r25c" "$NDK_DIR"
            fi
            
            echo "✅ NDK installed at: $NDK_DIR"
            ls -la "$NDK_DIR"
          else
            echo "❌ Failed to download NDK"
            exit 1
          fi
          
          echo "=== NDK Setup Complete ==="

      - name: Prepare Project
        run: |
          echo "=== Starting Build Preparation ==="
          
          mkdir -p build
          cd build
          
          echo "Copying project files..."
          cp -rv ../mobile/* . || true
          cp -rv ../models . || true
          cp -rv ../services . || true
          cp -rv ../repositories . || true
          cp -rv ../utils . || true
          cp -rv ../data . || true
          
          echo ""
          echo "=== Files in build directory ==="
          ls -la
          
          echo ""
          echo "=== Checking critical files ==="
          if [ -f "android_main.py" ]; then
            echo "✅ android_main.py found"
          else
            echo "❌ android_main.py NOT found"
            exit 1
          fi
          
          if [ -f "buildozer.spec" ]; then
            echo "✅ buildozer.spec found"
            echo "Content:"
            cat buildozer.spec
          else
            echo "❌ buildozer.spec NOT found"
            exit 1
          fi
          
          echo ""
          echo "=== Preparation Complete ==="

      - name: Build APK
        run: |
          echo "=== Starting APK Build ==="
          cd build
          
          rm -rf .buildozer
          
          echo "Running buildozer android debug..."
          buildozer android debug
          
          BUILD_STATUS=$?
          
          if [ $BUILD_STATUS -eq 0 ]; then
            echo ""
            echo "=== ✅ Build Successful ==="
            ls -lh bin/*.apk 2>/dev/null
          else
            echo ""
            echo "=== ❌ Build Failed (exit code: $BUILD_STATUS) ==="
            exit $BUILD_STATUS
          fi
        timeout-minutes: 90

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: menu-app-${{ github.sha }}
          path: build/bin/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/bin/*.apk
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
