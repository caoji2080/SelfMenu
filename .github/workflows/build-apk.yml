# Build Android APK - NDK 25c 固定下载地址

name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip curl wget openjdk-11-jdk build-essential libssl-dev libffi-dev python3-dev
          pip install --upgrade pip
          pip install flet==0.23.0 cython buildozer

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          cmdline-tools-version: 8512546
          platforms: android-32
          build-tools: 32.0.0

      - name: Download and Install NDK 25c
        run: |
          echo "=== Starting NDK 25c Installation ==="
          
          # 固定 NDK访问地址 - developer.android.com
          NDK_BASE_URL="https://developer.android.com/ndk/downloads/"
          NDK_ZIP="/tmp/android-ndk-r25c-linux.zip"
          NDK_BASE="${ANDROID_HOME}/ndk"
          NDK_VERSION="25.2.9519653"
          NDK_DIR="${NDK_BASE}/${NDK_VERSION}"
          
          # 创建目录
          mkdir -p "$NDK_BASE"
          
          # 检查是否已安装
          if [ -d "$NDK_DIR" ] && [ -f "${NDK_DIR}/source.properties" ]; then
            echo "✅ NDK already installed at: $NDK_DIR"
            
            # 设置环境变量供 Buildozer 使用
            export ANDROID_NDK="$NDK_DIR"
            export NDK_HOME="$NDK_DIR"
            echo "ANDROID_NDK=$NDK_DIR" >> $GITHUB_ENV
            echo "NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
            
            echo ""
            echo "Version info:"
            cat "${NDK_DIR}/source.properties"
            echo ""
            echo "✅ Using existing NDK installation"
            exit 0
          fi
          
          # 从固定地址下载 NDK 25c
          echo "📥 Accessing NDK from: ${NDK_BASE_URL}"
          echo "🔗 Direct download link for NDK r25c Linux"
          echo "Target: $NDK_ZIP"
          echo ""
          
          # 使用固定的直接下载地址（从 developer.android.com 页面获取的真实下载地址）
          DIRECT_NDK_URL="(https://developer.android.com/ndk/downloads/android-ndk-r25c-linux.zip"
          
          # 使用 curl 下载（带重试和进度显示）
          max_attempts=5
          attempt=1
          
          while [ $attempt -le $max_attempts ]; do
            echo "Download attempt $attempt of $max_attempts..."
            echo "Accessing: ${DIRECT_NDK_URL}"
            echo ""
            
            # 使用 curl 下载，设置超时和进度
            if curl -L --connect-timeout 60 --max-time 600 -o "$NDK_ZIP" "$DIRECT_NDK_URL" --progress-bar; then
              # 检查文件大小（应该大于 50MB）
              file_size=$(stat -c%s "$NDK_ZIP" 2>/dev/null || echo "0")
              file_size_mb=$((file_size / 1024 / 1024))
              
              echo ""
              echo "📊 Downloaded file size: ${file_size_mb} MB"
              
              if [ $file_size_mb -gt 50 ]; then
                echo "✅ Download successful (${file_size_mb} MB)"
                break
              else
                echo "⚠️ File too small (${file_size_mb} MB), retrying..."
                rm -f "$NDK_ZIP"
                attempt=$((attempt + 1))
                sleep 10
              fi
            else
              echo "⚠️ Download failed (attempt $attempt), waiting 10 seconds before retry..."
              attempt=$((attempt + 1))
              sleep 10
            fi
          done
          
          # 验证下载结果
          if [ ! -f "$NDK_ZIP" ]; then
            echo "❌ Failed to download NDK after $max_attempts attempts"
            echo "💡 Reference URL: ${NDK_BASE_URL}"
            echo "💡 Please verify the download link from: ${NDK_BASE_URL}"
            exit 1
          fi
          
          file_size=$(stat -c%s "$NDK_ZIP")
          file_size_mb=$((file_size / 1024 / 1024))
          
          if [ $file_size_mb -lt 50 ]; then
            echo "❌ Downloaded file is too small (${file_size_mb} MB, expected >50 MB)"
            exit 1
          fi
          
          # 解压 NDK
          echo ""
          echo "📦 Extracting NDK..."
          unzip -q "$NDK_ZIP" -d "$NDK_BASE"
          rm -f "$NDK_ZIP"
          
          # 查找并移动到正确目录
          extracted_dir="${NDK_BASE}/android-ndk-r25c"
          
          if [ ! -d "$extracted_dir" ]; then
            echo "❌ Extraction failed, directory not found: $extracted_dir"
            ls -la "$NDK_BASE"
            exit 1
          fi
          
          # 移动到目标目录
          echo "Moving NDK to: $NDK_DIR"
          mv "$extracted_dir" "$NDK_DIR"
          
          # 验证安装
          echo ""
          echo "=== NDK Installation Complete ==="
          echo "Location: $NDK_DIR"
          
          if [ -f "${NDK_DIR}/source.properties" ]; then
            echo "Version info:"
            cat "${NDK_DIR}/source.properties"
          else
            echo "⚠️ Warning: source.properties not found"
          fi
          
          echo ""
          echo "Directory contents:"
          ls -la "$NDK_DIR" | head -20
          
          # 设置环境变量供 Buildozer 使用
          export ANDROID_NDK="$NDK_DIR"
          export NDK_HOME="$NDK_DIR"
          echo "ANDROID_NDK=$NDK_DIR" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          
          echo ""
          echo "✅ NDK 25c installed successfully!"
          echo "Environment variables set:"
          echo "  ANDROID_NDK=$NDK_DIR"
          echo "  NDK_HOME=$NDK_DIR"
          echo "  Reference: ${NDK_BASE_URL}"

      - name: Prepare Project
        run: |
          echo "=== Starting Build Preparation ==="
          
          mkdir -p build
          cd build
          
          echo "Copying project files..."
          cp -rv ../mobile/* . || true
          cp -rv ../models . || true
          cp -rv ../services . || true
          cp -rv ../repositories . || true
          cp -rv ../utils . || true
          cp -rv ../data . || true
          
          echo ""
          echo "=== Files in build directory ==="
          ls -la
          
          echo ""
          echo "=== Checking critical files ==="
          if [ -f "android_main.py" ]; then
            echo "✅ android_main.py found"
          else
            echo "❌ android_main.py NOT found"
            exit 1
          fi
          
          if [ -f "buildozer.spec" ]; then
            echo "✅ buildozer.spec found"
            echo ""
            echo "Content:"
            cat buildozer.spec
          else
            echo "❌ buildozer.spec NOT found"
            exit 1
          fi
          
          echo ""
          echo "=== Preparation Complete ==="

      - name: Build APK
        run: |
          echo "=== Starting APK Build ==="
          cd build
          
          # 清理旧的构建缓存
          echo "Cleaning old build cache..."
          rm -rf .buildozer
          
          # 显示 NDK 环境信息
          echo ""
          echo "=== NDK Environment Check ==="
          if [ -n "$ANDROID_NDK" ]; then
            echo "ANDROID_NDK is set: $ANDROID_NDK"
          else
            echo "⚠️ ANDROID_NDK is not set"
          fi
          
          if [ -n "$NDK_HOME" ]; then
            echo "NDK_HOME is set: $NDK_HOME"
          else
            echo "⚠️ NDK_HOME is not set"
          fi
          echo "==============================="
          echo ""
          
          # 开始构建
          echo "Running buildozer android debug..."
          buildozer android debug
          
          BUILD_STATUS=$?
          
          if [ $BUILD_STATUS -eq 0 ]; then
            echo ""
            echo "=== ✅ Build Successful ==="
            echo "APK location:"
            ls -lh bin/*.apk 2>/dev/null || echo "⚠️ APK not found in bin/"
          else
            echo ""
            echo "=== ❌ Build Failed (exit code: $BUILD_STATUS) ==="
            exit $BUILD_STATUS
          fi
        timeout-minutes: 90

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: menu-app-${{ github.sha }}
          path: build/bin/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/bin/*.apk
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

