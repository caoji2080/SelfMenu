      - name: Prepare Project
        run: |
          echo "=== Preparing Project Files ==="
          
          mkdir -p build
          cd build
          
          echo "Copying mobile app files..."
          cp -rv ../mobile/* .
          
          echo "Copying project modules..."
          cp -rv ../models . || true
          cp -rv ../services . || true
          cp -rv ../repositories . || true
          cp -rv ../utils . || true
          cp -rv ../data . || true
          cp -rv ../*.py . || true
          
          echo ""
          echo "=== Cleaning up problematic files ==="
          rm -f readme.py || true
          rm -f tempfile_*.py || true
          rm -f *.md || true
          
          echo ""
          echo "=== Verifying Critical Files ==="
          ls -la
          
          # Check android_main.py
          if [ ! -f "android_main.py" ]; then
            echo "❌ android_main.py NOT FOUND!"
            exit 1
          fi
          echo "✅ android_main.py found"
          
          # Check buildozer.spec
          if [ ! -f "buildozer.spec" ]; then
            echo "❌ buildozer.spec NOT FOUND!"
            exit 1
          fi
          echo "✅ buildozer.spec found"
          
          # Show file structure
          echo ""
          echo "=== File Structure ==="
          find . -type f -name "*.py" | head -20
          
          echo ""
          echo "✅ All files prepared successfully"

